<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1f2e"/>
      <stop offset="50%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#3a2a5a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8bb8fa"/>
      <stop offset="50%" stop-color="#b48cf8"/>
      <stop offset="100%" stop-color="#f5a5c8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Split pane divider -->
  <rect x="504" y="180" width="16" height="664" rx="8" fill="#cdd8f4" opacity="0.15"/>

  <!-- Left pane: terminal cursor -->
  <g transform="translate(160 340)">
    <!-- Chevron prompt -->
    <path d="M 0 0 L 80 60 L 0 120" stroke="#8bb8fa" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
    <!-- Blinking cursor block -->
    <rect x="130" y="40" width="50" height="80" rx="8" fill="url(#accent)" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Right pane: browser window -->
  <g transform="translate(560 320)">
    <!-- Window frame -->
    <rect x="0" y="0" width="304" height="200" rx="20" fill="none" stroke="#cdd8f4" stroke-width="12" opacity="0.9"/>
    <!-- Traffic lights -->
    <circle cx="30" cy="28" r="10" fill="#f38ba8"/>
    <circle cx="62" cy="28" r="10" fill="#f9e2af"/>
    <circle cx="94" cy="28" r="10" fill="#a6e3a1"/>
    <!-- Address bar line -->
    <rect x="24" y="60" width="256" height="18" rx="9" fill="#cdd8f4" opacity="0.3"/>
    <!-- Content blocks -->
    <rect x="24" y="100" width="180" height="14" rx="7" fill="#8bb8fa" opacity="0.7"/>
    <rect x="24" y="128" width="140" height="14" rx="7" fill="#b48cf8" opacity="0.7"/>
    <rect x="24" y="156" width="200" height="14" rx="7" fill="#f5a5c8" opacity="0.7"/>
  </g>

  <!-- Wordmark: neetly -->
  <text x="512" y="860" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="140" font-weight="800" fill="url(#accent)" filter="url(#glow)">neetly</text>
</svg>
